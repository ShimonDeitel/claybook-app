name: claybook
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  claybook:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Clay Book - Polymer Clay Log
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.polymerclaylog
        PRODUCT_NAME: Clay Book - Polymer Clay Log
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
    scheme:
      testTargets:
        - claybookTests
        - claybookUITests
  claybookTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: claybook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.polymerclaylog.tests
        GENERATE_INFOPLIST_FILE: true
  claybookUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: claybook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.polymerclaylog.uitests
        GENERATE_INFOPLIST_FILE: true
